<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Anek+Devanagari&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap" rel="stylesheet">
    <title>Log In</title>
    <style>
        html, body {
            height: 125%;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
        }
            
        body {
            font-family: Arial, sans-serif;
            background-color: #f5d7a6;
        }

        header {
            background-color: #a05e18;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header img {
            height: 40px;
        }

        nav {
            display: flex;
            gap: 15px;
        }

        nav a {
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 5px;
        }
        nav a.sign_in_button{
            background-color: #CF8500;
            border: 1px solid black;
            color: black;
        }
        nav a.sign_in_button:hover, a.register_button:active{
            background-color: #d9d9d9	;
            color: black;
        }
        nav a.register_button{
            background-color: #743A00;
            color: white;
            border: 1px solid black;
        }
        nav a.register_button:hover, a.register_button:active{
            background-color: black;
            color: white;
        }
            
        .login-container {
            width: 43%;
            height: 58%;
            margin: 10px auto 70px;
            background-color: #EDCB89;
            padding: 30px;
            border-radius: 28px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .login-container h1 {
            color: #7d4d1f;
            text-align: center;
            padding-top: 45px;
            padding-bottom: 5px;
            color: #743A00; 
            font-family: Baloo Thambi, sans-serif; 
            font-size: 60px; 
            margin: auto 10px;
        }

        .login-container form {
            display: flex;
            flex-direction: column;
        }

        .login-container label {
            margin-bottom: 5px;
            color: #7d4d1f;
            width: 100%;
            
        }

        .login-container input {
            display: flex;
            align-items: center;
            padding: 8px;
            margin: 4px auto 35px;
            border: 1.5px solid #ccc;
            border-radius: 10px;
            width: 65%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
        }

        .login-container button {
            font-family: 'Baloo Thambi 2', sans-serif;
            font-size: 25px;
            padding: 1px;
            background-color: #743A00;
            margin: 25px auto 0;
            width: 25%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .login-container .extra-links {
            text-align: center;
            margin-top: 1px;
        }

        .login-container .extra-links a {
            text-decoration: underline;
            color: #7d4d1f;
            font-weight: bold;
        }

        .login-container button:hover {
            background-color: #a05e18;
        }

        footer {
            height: 15%;
            background-color: #a05e18;
            color: #fff;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        footer .social-icons {
            display: flex;
            gap: 10px;
        }

        footer .social-icons a {
            color: #fff;
            text-decoration: none;
            font-size: 20px;
        }

        footer .contact {
            height: auto;
            width: 28%;
            margin: 30px 30px auto;
            background-color: #FFAE36;
            padding: 10px;
            border-radius: 14px;
            color: #4E1600;
            font-size: 75%;
            line-height: 0.75;
        }
        /* #email_pass{
            text-align: center;
            padding: 17%;
        } */
        #data{
            padding-left: 140px;
            margin-bottom: 1px;
            line-height: 0.2;
        }
    </style>
</head>
<body>
    <header>
        <img src="logo.png" alt="Logo">
        <nav>
            <a href="#" color: black; style="color:black; background-color: #FFAE36;">About us</a>
            <a href="#" style="color: black;">Honey types</a>
            <a href="#" style="color: black">Shop</a>
            <a href="#" style="color: black">Contact</a>
            <a class="sign_in_button" href="#" >Sign in</a>
            <a class="register_button" href="#">Register</a>
        </nav>
    </header>
    <p style="text-align: center; color: #686868; font-size: 20px;">Main page / Log In</p>
    <div class="login-container">
        <h1 >Log In</h1>
        <p style="text-align: center; font-family: Alfa Slab One, sans-serif; padding-bottom: 50px;">New to this site? 
            <a href="#" style="color: #654900; text-decoration: underline;">Sign Up</a>
        </p>
        <form>
                <label for="email" id="data">Email Address</label><br>
                <input type="email" id="email" placeholder="abc@gmail.com " required>
  
                <label for="password" id="data">Password</label><br>
                <input type="password" id="password" placeholder="••••••••" required>
            <button type="submit">Sign in</button>
        </form>
        <div class="extra-links">
            <a href="#" style="font-family: Anek Devanagari; margin: auto 4px;">Forgot your password?</a>
        </div>
    </div>
    <footer>
        <div class="social-icons">
            <a href="#">X</a>
            <a href="#">Instagram</a>
            <a href="#">YouTube</a>
            <a href="#">LinkedIn</a>
        </div>
        <div class="links">
            <a href="#">About us</a><br>
            <a href="#">Honey types</a><br>
            <a href="#">Shop</a><br>
            <a href="#">Contact</a>
        </div>
        <div class="contact">
            <p>Contact us</p>
            <p>Phone:</p>
            <p>Email:</p>
            <p>Location:</p>
        </div>
    </footer>
</body>
</html>
